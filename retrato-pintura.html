function mnFastBlur(src,w,h,r){
  if(r<1)return src;
  const dst=new Uint8ClampedArray(src.length),inv=1/(2*r+1);
  for(let y=0;y<h;y++){for(let c=0;c<3;c++){let sum=0;for(let dx=-r;dx<=r;dx++)sum+=src[(y*w+Math.max(0,Math.min(w-1,dx)))*4+c];for(let x=0;x<w;x++){dst[(y*w+x)*4+c]=sum*inv;sum-=src[(y*w+Math.max(0,x-r))*4+c];sum+=src[(y*w+Math.min(w-1,x+r+1))*4+c];}}for(let x=0;x<w;x++)dst[(y*w+x)*4+3]=255;}
  const tmp=new Uint8ClampedArray(dst.length);
  for(let x=0;x<w;x++){for(let c=0;c<3;c++){let sum=0;for(let dy=-r;dy<=r;dy++)sum+=dst[(Math.max(0,Math.min(h-1,dy))*w+x)*4+c];for(let y=0;y<h;y++){tmp[(y*w+x)*4+c]=sum*inv;sum-=dst[(Math.max(0,y-r)*w+x)*4+c];sum+=dst[(Math.min(h-1,y+r+1)*w+x)*4+c];}}}
  for(let i=3;i<tmp.length;i+=4)tmp[i]=255;
  return tmp;
}

function mnEnhance(d,bri,con,sat,vib,hue){
  const cM=con/100,sM=sat/100,vM=vib/100,hS=hue/360,bA=bri*2.55;
  for(let i=0;i<d.length;i+=4){
    let r=d[i],g=d[i+1],b=d[i+2];
    if(bri!==0){r+=bA;g+=bA;b+=bA;}
    if(con!==100){const m=128;r=(r-m)*cM+m;g=(g-m)*cM+m;b=(b-m)*cM+m;}
    if(sat!==100){const l=.299*r+.587*g+.114*b;r=l+(r-l)*sM;g=l+(g-l)*sM;b=l+(b-l)*sM;}
    if(vib>0){const mx=Math.max(r,g,b),mn2=Math.min(r,g,b),cs=mx>0?(mx-mn2)/mx:0,boost=1+(1-cs)*vM,l2=.299*r+.587*g+.114*b;r=l2+(r-l2)*boost;g=l2+(g-l2)*boost;b=l2+(b-l2)*boost;}
    if(hue!==0){const ri=Math.max(0,Math.min(255,r)),gi=Math.max(0,Math.min(255,g)),bi2=Math.max(0,Math.min(255,b));const[h2,s2,l2]=rgbToHsl(ri,gi,bi2);const[nr,ng,nb]=hslToRgbU(h2+hS,s2,l2);r=nr;g=ng;b=nb;}
    d[i]=Math.max(0,Math.min(255,r));d[i+1]=Math.max(0,Math.min(255,g));d[i+2]=Math.max(0,Math.min(255,b));
  }
  return d;
}

function mnSlic(pixels,w,h,S,iters){
  const m=12,cx=[],cy=[];
  const gW=Math.ceil(w/S),gH=Math.ceil(h/S);
  for(let gy=0;gy<gH;gy++)for(let gx=0;gx<gW;gx++){cx.push(Math.min(w-1,Math.round((gx+.5)*S)));cy.push(Math.min(h-1,Math.round((gy+.5)*S)));}
  const K=cx.length,cr=new Float32Array(K),cg=new Float32Array(K),cb=new Float32Array(K);
  for(let k=0;k<K;k++){const i=(cy[k]*w+cx[k])*4;cr[k]=pixels[i];cg[k]=pixels[i+1];cb[k]=pixels[i+2];}
  const labels=new Int32Array(w*h).fill(-1),dist=new Float32Array(w*h).fill(Infinity),S2=S*S,m2=m*m;
  for(let it=0;it<iters;it++){
    dist.fill(Infinity);
    for(let k=0;k<K;k++){
      const x0=Math.max(0,Math.round(cx[k]-S)),x1=Math.min(w-1,Math.round(cx[k]+S));
      const y0=Math.max(0,Math.round(cy[k]-S)),y1=Math.min(h-1,Math.round(cy[k]+S));
      for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++){
        const i=(y*w+x)*4;
        const D=((pixels[i]-cr[k])**2+(pixels[i+1]-cg[k])**2+(pixels[i+2]-cb[k])**2)/255/255*3+((x-cx[k])**2+(y-cy[k])**2)/S2*m2;
        if(D<dist[y*w+x]){dist[y*w+x]=D;labels[y*w+x]=k;}
      }
    }
    const sx=new Float64Array(K),sy=new Float64Array(K),sr=new Float64Array(K),sg2=new Float64Array(K),sb=new Float64Array(K),cnt=new Int32Array(K);
    for(let y=0;y<h;y++)for(let x=0;x<w;x++){const k=labels[y*w+x];if(k<0)continue;sx[k]+=x;sy[k]+=y;const i=(y*w+x)*4;sr[k]+=pixels[i];sg2[k]+=pixels[i+1];sb[k]+=pixels[i+2];cnt[k]++;}
    for(let k=0;k<K;k++)if(cnt[k]>0){cx[k]=sx[k]/cnt[k];cy[k]=sy[k]/cnt[k];cr[k]=sr[k]/cnt[k];cg[k]=sg2[k]/cnt[k];cb[k]=sb[k]/cnt[k];}
  }
  return{labels,cr,cg,cb,K,cx,cy};
}

function mnDelaunay(pts){
  const ST=1e6,sp=[...pts,[-ST,-ST*.5],[ST*3,-ST*.5],[ST*.5,ST*3]],N=pts.length;
  let tris=[[N,N+1,N+2]];
  for(let pi=0;pi<N;pi++){
    const p=sp[pi],bad=[];
    for(const t of tris){
      const a=sp[t[0]],b=sp[t[1]],c=sp[t[2]];
      const D=2*(a[0]*(b[1]-c[1])+b[0]*(c[1]-a[1])+c[0]*(a[1]-b[1]));
      if(Math.abs(D)<1e-10)continue;
      const ux=((a[0]**2+a[1]**2)*(b[1]-c[1])+(b[0]**2+b[1]**2)*(c[1]-a[1])+(c[0]**2+c[1]**2)*(a[1]-b[1]))/D;
      const uy=((a[0]**2+a[1]**2)*(c[0]-b[0])+(b[0]**2+b[1]**2)*(a[0]-c[0])+(c[0]**2+c[1]**2)*(b[0]-a[0]))/D;
      if((p[0]-ux)**2+(p[1]-uy)**2<=(a[0]-ux)**2+(a[1]-uy)**2+1e-10)bad.push(t);
    }
    const ec=new Map();
    for(const t of bad)for(let i=0;i<3;i++){const e=[t[i],t[(i+1)%3]].sort((a,b2)=>a-b2).join(',');ec.set(e,(ec.get(e)||0)+1);}
    for(const t of bad)tris.splice(tris.indexOf(t),1);
    for(const[e,cnt]of ec)if(cnt===1){const[a,b2]=e.split(',').map(Number);tris.push([a,b2,pi]);}
  }
  return{tris:tris.filter(t=>t[0]<N&&t[1]<N&&t[2]<N),pts:sp};
}

function renderManchas(imageData,mirr){
  if(!manchasActive||!imageData||!W||!H)return;
  manchasFrameCount++;
  const mode=manchasRenderMode;
  const{width:sW,height:sH}=imageData;
  const maxDim=mode==='orbs'?160:320;
  const sc=Math.max(1,Math.ceil(Math.max(sW,sH)/maxDim));
  const rW=Math.round(sW/sc),rH=Math.round(sH/sc);
  if(!manchasSlicC){manchasSlicC=document.createElement('canvas');}
  manchasSlicC.width=rW;manchasSlicC.height=rH;
  const tmpC=document.createElement('canvas');tmpC.width=sW;tmpC.height=sH;
  tmpC.getContext('2d', { willReadFrequently: true }).putImageData(imageData,0,0);
  manchasSlicC.getContext('2d', { willReadFrequently: true }).drawImage(tmpC,0,0,rW,rH);
  const d=manchasSlicC.getContext('2d', { willReadFrequently: true }).getImageData(0,0,rW,rH);
  const blurR=gv('mn-blur'),satV=gv('mn-sat'),vibV=gv('mn-vib'),conV=gv('mn-con'),briV=gv('mn-bri'),hueV=gv('mn-hue');
  const S=Math.max(2,gv('mn-sz'));
  let pixels=new Uint8ClampedArray(d.data);
  mnEnhance(pixels,briV,conV,satV,vibV,hueV);
  if(blurR>0)pixels=mnFastBlur(pixels,rW,rH,blurR);
  const doMirr=mirr;
  const scF=Math.max(W/sW,H/sH),oxF=(W-sW*scF)/2,oyF=(H-sH*scF)/2;
  function tc(lx,ly){const cx2=oxF+lx*sc*scF,cy2=oyF+ly*sc*scF;return doMirr?[W-cx2,cy2]:[cx2,cy2];}
  manchasCtx.clearRect(0,0,W,H);

  if(mode==='water'){
    const{labels,cr,cg,cb,K}=mnSlic(pixels,rW,rH,S,4);
    const rowL=new Int16Array(K*rH).fill(32767),rowR=new Int16Array(K*rH).fill(-1);
    for(let y=0;y<rH;y++)for(let x=0;x<rW;x++){const k=labels[y*rW+x];if(k<0)continue;const idx=k*rH+y;if(x<rowL[idx])rowL[idx]=x;if(x>rowR[idx])rowR[idx]=x;}
    const eb=Math.max(4,Math.round(S*scF*sc*.6));
    manchasCtx.save();manchasCtx.filter=`blur(${eb}px)`;
    for(let k=0;k<K;k++){
      let y0=rH,y1=-1;for(let y=0;y<rH;y++){if(rowR[k*rH+y]>=0){if(y<y0)y0=y;if(y>y1)y1=y;}}
      if(y1<y0)continue;
      manchasCtx.beginPath();let started=false;
      for(let y=y0;y<=y1;y++){const l=rowL[k*rH+y];if(l===32767)continue;const[cx2,cy2]=tc(l-.5,y);if(!started){manchasCtx.moveTo(cx2,cy2);started=true;}else manchasCtx.lineTo(cx2,cy2);}
      for(let y=y1;y>=y0;y--){const r=rowR[k*rH+y];if(r<0)continue;manchasCtx.lineTo(...tc(r+.5,y));}
      manchasCtx.closePath();manchasCtx.fillStyle=`rgb(${Math.round(cr[k])},${Math.round(cg[k])},${Math.round(cb[k])})`;manchasCtx.fill();
    }
    manchasCtx.restore();
  }
  else if(mode==='voronoi'){
    const{labels,cr,cg,cb}=mnSlic(pixels,rW,rH,S,3);
    const outC=document.createElement('canvas');outC.width=rW;outC.height=rH;
    const outImg=new ImageData(rW,rH);
    for(let i=0;i<rW*rH;i++){const k=labels[i];if(k<0)continue;outImg.data[i*4]=Math.round(cr[k]);outImg.data[i*4+1]=Math.round(cg[k]);outImg.data[i*4+2]=Math.round(cb[k]);outImg.data[i*4+3]=255;}
    outC.getContext('2d', { willReadFrequently: true }).putImageData(outImg,0,0);
    manchasCtx.save();if(doMirr){manchasCtx.translate(W,0);manchasCtx.scale(-1,1);}
    manchasCtx.imageSmoothingEnabled=true;manchasCtx.imageSmoothingQuality='high';
    manchasCtx.drawImage(outC,oxF,oyF,sW*scF,sH*scF);manchasCtx.restore();
  }
  else if(mode==='lowpoly'){
    const step=Math.max(2,Math.round(S/2)),pts=[];
    for(let y=step;y<rH-step;y+=step)for(let x=step;x<rW-step;x+=step){
      const gx=pixels[(y*rW+Math.min(rW-1,x+1))*4]-pixels[(y*rW+Math.max(0,x-1))*4];
      const gy=pixels[(Math.min(rH-1,y+1)*rW+x)*4]-pixels[(Math.max(0,y-1)*rW+x)*4];
      if(Math.sqrt(gx*gx+gy*gy)>15||Math.random()<.15)pts.push([x+(Math.random()-.5)*step*.4,y+(Math.random()-.5)*step*.4]);
    }
    for(let x=0;x<=rW;x+=Math.round(rW/10))pts.push([x,0],[x,rH]);
    for(let y=0;y<=rH;y+=Math.round(rH/8))pts.push([0,y],[rW,y]);
    if(pts.length<4)return;
    const{tris,pts:allPts}=mnDelaunay(pts);
    manchasCtx.save();
    for(const t of tris){
      const[ax,ay]=allPts[t[0]],[bx,by]=allPts[t[1]],[cx2,cy2]=allPts[t[2]];
      const mcx=(ax+bx+cx2)/3,mcy=(ay+by+cy2)/3;
      const px2=Math.max(0,Math.min(rW-1,Math.round(mcx))),py2=Math.max(0,Math.min(rH-1,Math.round(mcy)));
      const i=(py2*rW+px2)*4,r=pixels[i],g=pixels[i+1],b=pixels[i+2];
      manchasCtx.beginPath();manchasCtx.moveTo(...tc(ax,ay));manchasCtx.lineTo(...tc(bx,by));manchasCtx.lineTo(...tc(cx2,cy2));manchasCtx.closePath();
      manchasCtx.fillStyle=`rgb(${r},${g},${b})`;manchasCtx.fill();
      manchasCtx.strokeStyle=`rgba(${Math.min(255,r+20)},${Math.min(255,g+20)},${Math.min(255,b+20)},.3)`;manchasCtx.lineWidth=.7;manchasCtx.stroke();
    }
    manchasCtx.restore();
  }
  else if(mode==='orbs'){
    const step=Math.max(1,Math.round(S/3));
    manchasCtx.save();
    for(let y=0;y<rH;y+=step)for(let x=0;x<rW;x+=step){
      const i=(y*rW+x)*4,r=pixels[i],g=pixels[i+1],b=pixels[i+2],bright=(r+g+b)/3;
      const wMap=bright/255*S*sc*scF;
      const[cx2,cy2]=tc(x,y);
      const hue2=((manchasFrameCount*1.2+r)%256)/256,sat=Math.min(1,g/255*1.4),lig=Math.min(.9,b/255*1.1+.2);
      const[hr,hg,hb]=hslToRgbU(hue2,sat,lig);
      manchasCtx.save();manchasCtx.translate(cx2,cy2);manchasCtx.rotate(bright/255*Math.PI*2);
      manchasCtx.fillStyle=`rgb(${hr},${hg},${hb})`;manchasCtx.beginPath();
      const sz=bright>128?wMap:wMap*.5;manchasCtx.ellipse(0,0,Math.max(.5,sz),Math.max(.5,sz),0,0,Math.PI*2);manchasCtx.fill();
      manchasCtx.restore();
    }
    manchasCtx.restore();
  }
  else if(mode==='pixels'){
    manchasCtx.save();if(doMirr){manchasCtx.translate(W,0);manchasCtx.scale(-1,1);}
    manchasCtx.imageSmoothingEnabled=false;
    manchasSlicC.getContext('2d', { willReadFrequently: true }).putImageData(new ImageData(pixels,rW,rH),0,0);
    manchasCtx.drawImage(manchasSlicC,oxF,oyF,sW*scF,sH*scF);manchasCtx.restore();
  }
}

function tickManchas(imgData,mirr){
  if(!manchasActive)return;
  manchasFrameSkip++;
  const rate=manchasRenderMode==='orbs'?2:manchasRenderMode==='lowpoly'?20:8;
  if(manchasFrameSkip%rate!==0)return;
  renderManchas(imgData,mirr);
}

// ═══════════════════════════════════════════════
// AUDIO FILTERS (Web Audio API on screen/cam audio)
// ═══════════════════════════════════════════════
let audioCtx=null,audioSrcNode=null,audioFilterNode=null,audioGainNode=null,
    audioReverbNode=null,audioReverbActive=false,audioDestNode=null,
    audioAnalyser=null,audioStream=null,vuInterval=null;

function getOrCreateAudioCtx(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

async function toggleAudioCapture(){
  const btn=document.getElementById('btn-audio-enable');
  if(audioSrcNode){
    // Stop
    if(audioStream)audioStream.getTracks().forEach(t=>t.stop());
    audioSrcNode.disconnect();audioSrcNode=null;audioStream=null;
    if(vuInterval){clearInterval(vuInterval);vuInterval=null;}
    document.getElementById('vu-meter').textContent='—';
    btn.textContent='activar audio';btn.classList.remove('on-au');
    ['sel-audio-filter','audio-freq','audio-q','btn-audio-reverb','audio-reverb','audio-pitch','audio-vol'].forEach(id=>{
      const el=document.getElementById(id);if(el)el.disabled=true;
    });
    return;
  }
  try{
    // Use getUserMedia for capturing microphone audio reliably
    let stream=null;
    if(sgStream&&sgStream.getAudioTracks().length>0){
      stream=sgStream;
    } else {
      stream=await navigator.mediaDevices.getUserMedia({
        video:false,
        audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false,sampleRate:48000}
      });
    }
    audioStream=stream;
    const ctx=getOrCreateAudioCtx();
    audioSrcNode=ctx.createMediaStreamSource(stream);
    audioAnalyser=ctx.createAnalyser();
    audioAnalyser.fftSize=256;
    audioFilterNode=ctx.createBiquadFilter();
    audioFilterNode.type='lowpass';
    audioFilterNode.frequency.value=gv('audio-freq');
    audioFilterNode.Q.value=gv('audio-q');
    audioGainNode=ctx.createGain();
    audioGainNode.gain.value=gv('audio-vol')/100;
    // Reverb (convolver with impulse)
    audioReverbNode=ctx.createConvolver();
    buildImpulse(gv('audio-reverb')/100);
    audioDestNode=ctx.createMediaStreamDestination();
    // Chain: src -> filter -> gain -> (reverb?) -> analyser -> dest + speakers
    rebuildAudioChain();
    btn.textContent='stop audio';btn.classList.add('on-au');
    ['sel-audio-filter','audio-freq','audio-q','btn-audio-reverb','audio-reverb','audio-pitch','audio-vol'].forEach(id=>{
      const el=document.getElementById(id);if(el)el.disabled=false;
    });
    // VU meter
    vuInterval=setInterval(()=>{
      if(!audioAnalyser)return;
      const buf=new Uint8Array(audioAnalyser.frequencyBinCount);
      audioAnalyser.getByteFrequencyData(buf);
      const avg=buf.reduce((a,b)=>a+b,0)/buf.length;
      const bars='█'.repeat(Math.round(avg/20))+'░'.repeat(Math.max(0,13-Math.round(avg/20)));
      document.getElementById('vu-meter').textContent=bars;
    },80);
  }catch(e){
    document.getElementById('status-txt').textContent='audio denegado';
  }
}

function buildImpulse(secs){
  if(!audioCtx||!audioReverbNode)return;
  const rate=audioCtx.sampleRate;
  const len=Math.max(0.1,secs)*rate*2;
  const buf=audioCtx.createBuffer(2,len,rate);
  for(let c=0;c<2;c++){const d=buf.getChannelData(c);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,4);}
  audioReverbNode.buffer=buf;
}

function rebuildAudioChain(){
  if(!audioSrcNode)return;
  audioSrcNode.disconnect();
  if(audioFilterNode)audioFilterNode.disconnect();
  if(audioGainNode)audioGainNode.disconnect();
  if(audioReverbNode)audioReverbNode.disconnect();
  if(audioAnalyser)audioAnalyser.disconnect();
  const ctx=audioCtx;
  const selFilter=document.getElementById('sel-audio-filter').value;
  if(selFilter==='none'){
    audioSrcNode.connect(audioGainNode);
  } else {
    audioFilterNode.type=selFilter;
    audioSrcNode.connect(audioFilterNode);
    audioFilterNode.connect(audioGainNode);
  }
  if(audioReverbActive){
    audioGainNode.connect(audioReverbNode);
    audioReverbNode.connect(audioAnalyser);
  } else {
    audioGainNode.connect(audioAnalyser);
  }
  audioAnalyser.connect(audioDestNode);
  audioAnalyser.connect(ctx.destination);
}

function setAudioFilter(v){
  if(!audioFilterNode)return;
  audioFilterNode.type=v;
  rebuildAudioChain();
}

function toggleReverb(){
  audioReverbActive=!audioReverbActive;
  const b=document.getElementById('btn-audio-reverb');
  b.classList.toggle('on-au',audioReverbActive);
  rebuildAudioChain();
}

document.getElementById('audio-freq').addEventListener('input',e=>{
  sv('audio-freq',e.target.value);
  if(audioFilterNode)audioFilterNode.frequency.value=+e.target.value;
});
document.getElementById('audio-q').addEventListener('input',e=>{
  sv('audio-q',e.target.value);
  if(audioFilterNode)audioFilterNode.Q.value=+e.target.value;
});
document.getElementById('audio-vol').addEventListener('input',e=>{
  sv('audio-vol',e.target.value);
  if(audioGainNode)audioGainNode.gain.value=+e.target.value/100;
});
document.getElementById('audio-reverb').addEventListener('input',e=>{
  sv('audio-reverb',e.target.value);
  buildImpulse(+e.target.value/100);
});
document.getElementById('audio-pitch').addEventListener('input',e=>{
  sv('audio-pitch',e.target.value);
  // Approximate pitch via playbackRate detune on a silent oscillator offset
  // True pitch shifting requires AudioWorklet — this shifts the filter freq as proxy
  if(audioFilterNode){
    const semitones=+e.target.value;
    const freqScale=Math.pow(2,semitones/12);
    audioFilterNode.detune.value=semitones*100; // detune in cents
  }
  if(audioGainNode)document.getElementById('status-txt').textContent=`pitch: ${e.target.value>0?'+':''}${e.target.value}st`;
});

function pushUndo(){
  if(!W||!H)return;
  // Trim future if we're mid-stack
  undoStack=undoStack.slice(0,undoPtr+1);
  undoStack.push(paintCtx.getImageData(0,0,W,H));
  if(undoStack.length>UNDO_MAX)undoStack.shift();
  undoPtr=undoStack.length-1;
}
function undoPaint(){
  if(undoPtr<=0){flashUndo('—');return;}
  undoPtr--;
  paintCtx.putImageData(undoStack[undoPtr],0,0);
  flashUndo('undo');
}
function redoPaint(){
  if(undoPtr>=undoStack.length-1){flashUndo('—');return;}
  undoPtr++;
  paintCtx.putImageData(undoStack[undoPtr],0,0);
  flashUndo('redo');
}
function flashUndo(msg){
  const el=document.getElementById('undo-flash');
  el.textContent=msg;el.style.opacity='1';
  setTimeout(()=>el.style.opacity='0',500);
}

const PRESET_IDS=['p-size','p-dens','p-chaos','p-op','p-speed','p-hue',
  'mot-thresh','mot-size','mot-trail',
  'px-size','px-op','blur-radius','blur-op',
  'water-cells','water-drip','water-op',
  'mn-sz','mn-blur','mn-op','mn-bri','mn-con','mn-sat','mn-vib','mn-hue',
  'ink-hue','s-op-contour'];

function savePreset(){
  const p={};
  PRESET_IDS.forEach(id=>{const el=document.getElementById(id);if(el)p[id]=el.value;});
  ['sel-blend','manchas-mode','manchas-blend','sel-audio-filter'].forEach(id=>{const el=document.getElementById(id);if(el)p[id]=el.value;});
  p.inkH=inkH;p.inkS=inkS;p.inkL=inkL;
  p.paintStyle=paintStyle;p.paintTint=paintTint;
  p.manchasRenderMode=manchasRenderMode;
  try{localStorage.setItem('retrato_v6_preset',JSON.stringify(p));}catch(e){}
  document.getElementById('status-txt').textContent='preset guardado ✓';
  setTimeout(()=>document.getElementById('status-txt').textContent=camActive||screenActive?'':'—',2000);
}

function loadPreset(){
  let raw;try{raw=localStorage.getItem('retrato_v6_preset');}catch(e){}
  if(!raw){document.getElementById('status-txt').textContent='sin preset guardado';return;}
  const p=JSON.parse(raw);
  PRESET_IDS.forEach(id=>{
    const el=document.getElementById(id);
    if(el&&p[id]!==undefined){el.value=p[id];sv(id,p[id]);}
  });
  ['sel-blend','manchas-mode','manchas-blend','sel-audio-filter'].forEach(id=>{
    const el=document.getElementById(id);if(el&&p[id])el.value=p[id];
  });
  if(p.inkH!==undefined){inkH=+p.inkH;inkS=+p.inkS;inkL=+p.inkL;drawWheel();drawLbar();upInk();}
  if(p.paintStyle){paintStyle=p.paintStyle;document.querySelectorAll('#style-grid .btn').forEach(b=>b.classList.toggle('on-p',b.id==='ps-'+paintStyle));}
  if(p.paintTint)paintTint=p.paintTint;
  if(p.manchasRenderMode){manchasRenderMode=p.manchasRenderMode;const sel=document.getElementById('manchas-mode');if(sel)sel.value=manchasRenderMode;}
  const blendEl=document.getElementById('sel-blend');if(blendEl)setBlend(blendEl.value);
  const mnBlendEl=document.getElementById('manchas-blend');if(mnBlendEl)manchasC.style.mixBlendMode=mnBlendEl.value;
  const cop=document.getElementById('s-op-contour');if(cop){camC.style.opacity=cop.value/100;screenC.style.opacity=cop.value/100;}
  document.getElementById('status-txt').textContent='preset cargado ✓';
  setTimeout(()=>document.getElementById('status-txt').textContent=camActive||screenActive?'':'—',2000);
}

buildPresets();buildInkPresets();buildStyleGrid();buildBrushGrid();buildTintDots();
drawWheel();drawLbar();upInk();

// Sync all range inputs
['p-size','p-dens','p-chaos','p-op','p-speed','p-hue','mot-thresh','mot-size','mot-trail','px-size','px-op','blur-radius','blur-op','water-cells','water-drip','water-op','mn-sz','mn-blur','mn-op','mn-bri','mn-con','mn-sat','mn-vib','mn-hue','ink-hue','poster-lvl','eglow-amt','eglow-hue','chroma-amt','dt-mix','fb-decay','fb-dx','fb-dy','kaleido-seg'].forEach(id=>{
  const el=document.getElementById(id);if(!el)return;
  const valEl=document.getElementById('v-'+id);
  if(valEl)valEl.textContent=el.value;
});

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;
  if(sgOverlay.classList.contains('active'))return;
  if(e.code==='Space'){e.preventDefault();exportPng();}
  if(e.code==='KeyF'&&!e.ctrlKey){e.preventDefault();doCapture();}
  if(e.code==='KeyP'){e.preventDefault();togglePaint();}
  if(e.code==='KeyC'){e.preventDefault();clearPaint();}
  if(e.code==='KeyM'){e.preventDefault();toggleMotion();}
  if(e.code==='KeyX'){e.preventDefault();togglePixelate();}
  if(e.code==='KeyB'){e.preventDefault();toggleBrushPaint();}
  if(e.code==='KeyN'){e.preventDefault();toggleManchas();}
  if((e.code==='KeyZ')&&(e.ctrlKey||e.metaKey)){e.preventDefault();e.shiftKey?redoPaint():undoPaint();}
  if((e.code==='KeyZ')&&!e.ctrlKey&&!e.metaKey){e.preventDefault();undoPaint();}
  if((e.code==='KeyY')&&!e.ctrlKey){e.preventDefault();redoPaint();}
});
</script>
