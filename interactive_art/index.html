<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethereal Living Paint</title>
    <link rel="stylesheet" href="style.css">
    <!-- Load p5.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <!-- Load Tone.js for audio synthesis -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>
    <div id="ui-container">
        <h1>Ethereal Canvas</h1>
        <p>Click and drag to paint with light and sound.</p>
        <button id="start-audio">Start Experience</button>
        <button id="clear-btn">Clear Canvas</button>
        <button id="save-btn">Save Artwork</button>

        <div class="control-group">
            <label>Persistence: <span id="pers-val">50%</span></label>
            <input type="range" id="persistence" min="0" max="1" step="0.01" value="0.5">
        </div>
        <div class="control-group">
            <label>Brush Size: <span id="size-val">1.0x</span></label>
            <input type="range" id="brush-size" min="0.5" max="3.0" step="0.1" value="1.0">
        </div>
        <div class="control-group">
            <label>Chaos Level: <span id="chaos-val">10%</span></label>
            <input type="range" id="chaos" min="0" max="1" step="0.01" value="0.10">
        </div>
    </div>
    <script src="svgHelpers.js"></script>
    <script src="app.js"></script>
</body>
</html>
